<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voekk — Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div>
      <h1>Voekk</h1>
      <p>Blog personal</p>
    </div>
    <button id="boton-modo" onclick="toggleModo()">? Claro</button>
  </header>

  <main>
    <article>
      <h2>Bienvenido</h2>
      <p>Este es mi blog. Próximamente más contenido.</p>
    </article>
  </main>

  <footer>
    <p>BrawlStars es Mierda</p>
  </footer>

  <script>
    function toggleModo() {
      document.body.classList.toggle('claro');
      const boton = document.getElementById('boton-modo');
      if (document.body.classList.contains('claro')) {
        boton.textContent = '? Oscuro';
      } else {
        boton.textContent = '? Claro';
      }
    }
  </script>

</body>
</html>
